services:
  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/novels.db
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ZHIPU_API_URL=${ZHIPU_API_URL}
      - ZHIPU_EMBEDDING_MODEL=${ZHIPU_EMBEDDING_MODEL:-embedding-3}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_API_URL=https://api.deepseek.com/v1
      - DEFAULT_AI_MODEL=${DEFAULT_AI_MODEL:-zhipu}
      - REVIEW_STRICTNESS=${REVIEW_STRICTNESS:-strict}
    volumes:
      - data-volume:/app/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  data-volume:
