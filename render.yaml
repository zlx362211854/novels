services:
  - name: novelforge-api
    type: web
    runtime: docker
    rootDir: backend
    plan: starter
    region: singapore
    numInstances: 1
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DB_PATH
        value: /app/data/novels.db
      - key: ZHIPU_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEFAULT_AI_MODEL
        value: deepseek
      - key: REVIEW_STRICTNESS
        value: strict
    disk:
      name: novelforge-data
      mountPath: /app/data
      sizeGB: 1

  - name: novelforge-web
    type: web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
